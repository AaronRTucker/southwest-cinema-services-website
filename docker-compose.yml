services:
  web:
    build: .
    command: >
      sh -c "npx prisma generate &&
             npx prisma migrate deploy &&
             npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/prod.db
      - AUTH_SECRET=${AUTH_SECRET}
      - NODE_ENV=development
    restart: unless-stopped

volumes:
  node_modules:
